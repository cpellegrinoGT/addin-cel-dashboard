<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEL Dashboard</title>
</head>
<body>
  <div id="cel-root"></div>
  <!-- Register add-in synchronously so MyGeotab finds it immediately -->
  <script>
    (function () {
      console.log("[CEL-shell] inline script running");
      var pending = { initialize: null, focus: null, blur: null };
      var ready = false;
      var queued = [];

      window.__celReady = function (impl) {
        console.log("[CEL-shell] __celReady called, queued:", queued.length);
        pending = impl;
        ready = true;
        queued.forEach(function (fn) { fn(); });
        queued = [];
      };

      if (typeof geotab === "undefined") { window.geotab = { addin: {} }; }
      if (!geotab.addin) { geotab.addin = {}; }

      geotab.addin.celDashboard = function () {
        console.log("[CEL-shell] celDashboard() factory called by MyGeotab");
        return {
          initialize: function (api, state, callback) {
            console.log("[CEL-shell] initialize called, ready:", ready);
            if (ready) { pending.initialize(api, state, callback); }
            else { queued.push(function () { pending.initialize(api, state, callback); }); }
          },
          focus: function (api, state) {
            console.log("[CEL-shell] focus called, ready:", ready);
            if (ready) { pending.focus(api, state); }
            else { queued.push(function () { pending.focus(api, state); }); }
          },
          blur: function () {
            console.log("[CEL-shell] blur called, ready:", ready);
            if (ready) { pending.blur(); }
            else { queued.push(function () { pending.blur(); }); }
          }
        };
      };
      console.log("[CEL-shell] geotab.addin.celDashboard registered");
    })();
  </script>
  <script type="module" src="./cel.js"></script>
</body>
</html>
